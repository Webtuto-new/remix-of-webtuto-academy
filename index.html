<!doctype html>

  <head>
    <script>
      // Prevent flash of unstyled content for dark mode
      (function() {
        try {
          var theme = localStorage.getItem('webtuto-theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>

    <script>
      // Capture install prompt before React mounts so we never miss the event.
      window.__wtDeferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__wtDeferredInstallPrompt = e;
        window.dispatchEvent(new Event('wt-install-available'));
      });
      window.addEventListener('appinstalled', function () {
        window.__wtDeferredInstallPrompt = null;
        try { localStorage.setItem('wt_install_prompt_seen', '1'); } catch (e) {}
      });
    </script>

  <body>
    <div id="root"></div>
    <script type="text/javascript">
      // SPA redirect handler: converts query-based redirect back to proper path
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
